services:
  - type: web
    name: tally-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tally-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tally-redis
          type: redis
          property: connectionString
      - key: STORAGE_MODE
        value: s3
      - key: AWS_REGION
        value: eu-west-2

  - type: redis
    name: tally-redis
    ipAllowList: []

  - type: worker
    name: tally-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker --url $REDIS_URL
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tally-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tally-redis
          type: redis
          property: connectionString

databases:
  - name: tally-postgres
