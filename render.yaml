services:
  - type: web
    name: tally-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tally-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tally-redis
          type: redis
          property: connectionString
      - key: STORAGE_MODE
        value: local
      - key: LOCAL_STORAGE_PATH
        value: ./data/storage

  - type: redis
    name: tally-redis
    ipAllowList: []

  - type: worker
    name: tally-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tally-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tally-redis
          type: redis
          property: connectionString
      - key: STORAGE_MODE
        value: local
      - key: LOCAL_STORAGE_PATH
        value: ./data/storage

databases:
  - name: tally-postgres
